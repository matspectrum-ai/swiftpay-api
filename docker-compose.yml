version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: swiftpay-postgres
    environment:
      POSTGRES_USER: swiftpay
      POSTGRES_PASSWORD: swiftpay
      POSTGRES_DB: swiftpay
    ports:
      - "5432:5432"
    volumes:
      - swiftpay-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U swiftpay -d swiftpay"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: swiftpay-api
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: "8080"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: swiftpay
      DB_PASSWORD: swiftpay
      DB_NAME: swiftpay
      DB_SSLMODE: disable
      PSP_MOCK_ENABLED: "true"
      WORKER_OUTBOX_POLL_INTERVAL: "5s"
      WORKER_RECONCILIATION_SCHEDULE: "@every 30m"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  swiftpay-pgdata:
